name: build-and-test-arm
'on':
  push:
    branches:
    - main
    tags:
    - v[0-9]+.[0-9]+.[0-9]+*
  merge_group:
    types:
    - checks_requested
  pull_request: null
env:
  TEST_RESULTS: testbed/tests/results/junit/results.xml
  SEGMENT_DOWNLOAD_TIMEOUT_MINS: 2
permissions: read-all
concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true
jobs:
  arm-unittest-matrix:
    strategy:
      matrix:
        os:
        - ubuntu-latest
        - macos-14
    if: ${{ github.actor != 'dependabot[bot]' && (contains(github.event.pull_request.labels.*.name,
      'Run ARM') || github.event_name == 'push' || github.event_name == 'merge_group')
      }}
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
      with:
        go-version: oldstable
        cache: false
    - name: Cache Go
      id: go-cache
      timeout-minutes: 5
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
      with:
        path: '~/go/bin

          ~/go/pkg/mod

          '
        key: go-cache-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/go.sum')
          }}
    - name: Install dependencies
      if: steps.go-cache.outputs.cache-hit != 'true'
      run: make gomoddownload
    - name: Run Unit Tests
      run: make -j4 gotest
  arm-unittest:
    if: ${{ github.actor != 'dependabot[bot]' && (contains(github.event.pull_request.labels.*.name,
      'Run ARM') || github.event_name == 'push' || github.event_name == 'merge_group')
      }}
    runs-on: ubuntu-latest
    needs:
    - arm-unittest-matrix
    steps:
    - name: Print result
      run: echo ${{ needs.arm-unittest-matrix.result }}
    - name: Interpret result
      run: "if [[ success == ${{ needs.arm-unittest-matrix.result }} ]]\nthen\n  echo\
        \ \"All matrix jobs passed!\"\nelse\n  echo \"One or more matrix jobs failed.\"\
        \n  false\nfi\n"
